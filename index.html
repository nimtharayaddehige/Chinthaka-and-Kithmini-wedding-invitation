<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chinththaka & Kithmini Wedding Invitation</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #f9f7f4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
    }

    .card-container {
      position: relative;
      width: 100%;
      max-width: 480px;          /* Slightly wider max for better readability */
      margin: 1rem;
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .card-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    .overlay-buttons {
      position: absolute;
      bottom: 5%;               /* Relative positioning – better than fixed cm */
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;                /* Reasonable spacing between buttons */
      padding: 0 16px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 85%;               /* Almost full width on mobile */
      max-width: 360px;
      padding: 14px 24px;       /* Comfortable touch area */
      font-size: 1.05rem;       /* Readable but not too big */
      font-weight: 600;
      border-radius: 9999px;
      text-decoration: none;
      transition: all 0.25s ease;
      backdrop-filter: blur(6px);
      min-height: 48px;         /* Minimum touch target height */
    }

    .map-btn {
      background: rgba(255, 255, 255, 0.88);
      color: #4a2c0f;
      border: 1.5px solid #c19a2e;
    }

    .map-btn:hover,
    .map-btn:focus {
      background: rgba(255, 255, 255, 0.98);
      transform: scale(1.03);
    }

    .rsvp-btn {
      background: rgba(178, 136, 0, 0.88); /* gold tone */
      color: white;
      border: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.25);
    }

    .rsvp-btn:hover,
    .rsvp-btn:focus {
      background: rgba(212, 175, 55, 0.95);
      transform: scale(1.03);
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      .overlay-buttons {
        bottom: 4%;
        gap: 10px;
        padding: 0 12px;
      }

      .btn {
        padding: 12px 20px;
        font-size: 0.95rem;     /* Slightly smaller text on very small screens */
        width: 90%;
      }
    }

    @media (max-width: 360px) {
      .btn {
        font-size: 0.9rem;
        padding: 10px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="card-container">
    <!-- Your invitation card image -->
    <img
      src="./invitation-card.jpg"
      alt="Wedding Invitation Card"
    />

    <!-- Buttons overlaid on the bottom of the image -->
    <div class="overlay-buttons">
      <a href="https://maps.app.goo.gl/9huxdCqZa8YyqHoT7"
         target="_blank"
         class="btn map-btn">
        📍 at Sawingir Hills Hotel, Gonapola
      </a>

      <a href="https://docs.google.com/forms/d/e/1FAIpQLSdAQlIrj-h_R4anRRWfvFAHf6JvFkdiDTpIiRiafukPi3oT-w/viewform?usp=publish-editor"
         target="_blank"
         class="btn rsvp-btn">
        Reception To Follow
      </a>
    </div>
  </div>
</body>
</html>
