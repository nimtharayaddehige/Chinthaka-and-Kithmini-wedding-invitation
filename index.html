<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chinththaka & Kithmini Wedding Invitation</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #f9f7f4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
    }

    .card-container {
      position: relative;
      width: 100%;
      max-width: 500px;           /* bit wider on desktop, still fine on mobile */
      margin: 16px;
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .card-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    .overlay-buttons {
      position: absolute;
      bottom: 3%;                /* relative to card height – adjust 3–7% if needed */
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      padding: 0 14px;
      pointer-events: auto;      /* make sure buttons are clickable */
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 88%;
      max-width: 380px;
      padding: 14px 24px;
      font-size: 1.05rem;
      font-weight: 600;
      border-radius: 9999px;
      text-decoration: none;
      transition: all 0.25s ease;
     
      min-height: 48px;          /* minimum touch target size */

    }

    .map-btn {
      
      
     
    }

    .map-btn:hover,
    .map-btn:focus {
    
      transform: scale(1.03);
    }

    .rsvp-btn {
      background: rgba(178, 136, 0, 0.88);
      color: white;
      border: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.25);
      box-sizing: border-box;
    }

    .rsvp-btn:hover,
    .rsvp-btn:focus {
      background: rgba(212, 175, 55, 0.95);
      transform: scale(1.03);
    }

    /* ──────────────────────────────────────────────── */
    /* Mobile adjustments */
    @media (max-width: 480px) {
      .card-container {
        margin: 8px;
        border-radius: 1rem;
      }

      .overlay-buttons {
        bottom: 3.5%;           /* slightly higher on small screens */
        gap: 10px;
        padding: 0 12px;
      }

      .btn {
        width: 92%;
        padding: 12px 20px;
        font-size: 0.98rem;     /* readable but fits better */
        min-height: 46px;
      }
    }

    @media (max-width: 360px) {
      .btn {
        font-size: 0.92rem;
        padding: 10px 18px;
      }
    }
  </style>
</head>
<body>

  <div class="card-container">
    <img
      src="./invitation-card.jpg"
      alt="Wedding Invitation Card"
    />

    <div class="overlay-buttons">
      <a href="https://maps.app.goo.gl/9huxdCqZa8YyqHoT7"
         target="_blank"
         class="btn map-btn">
        📍 at Sawingir Hills Hotel, Gonapola
      </a>

      <a href="https://docs.google.com/forms/d/e/1FAIpQLSdAQlIrj-h_R4anRRWfvFAHf6JvFkdiDTpIiRiafukPi3oT-w/viewform?usp=publish-editor"
         target="_blank"
         class="btn rsvp-btn">
        Reception To Follow
      </a>
    </div>
  </div>

</body>
</html>
